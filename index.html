<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MagisterIA - Full Experience</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --accent-color: #00c2ff;
            --header-height: 60px;
        }

        /* Вимикаємо прокрутку самої сторінки, щоб працювала тільки прокрутка чату */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        /* Тонка, сучасна шапка */
        header {
            height: var(--header-height);
            background: rgba(16, 20, 28, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid #2d333b;
            box-sizing: border-box;
        }

        .logo {
            color: #fff;
            font-weight: 800;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 194, 255, 0.5);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #a3a3a3;
            background: rgba(255,255,255,0.05);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid #333;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        /* Контейнер для чату на весь екран */
        .main-app {
            height: calc(100vh - var(--header-height));
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        iframe {
            flex-grow: 1;
            width: 100%;
            border: none;
            /* Дозволяємо браузеру коректно обробляти висоту на мобільних */
            height: 100%;
        }

        /* Мобільні виправлення */
        @media (max-width: 768px) {
            header { padding: 0 15px; }
            .logo { font-size: 1.1rem; }
            .status span { display: none; } /* Ховаємо текст статусу на малих екранах */
        }
    </style>

</head>
<body>

    <header>
        <div class="logo">Magister<span>IA</span></div>
        <div class="status">
            <div class="status-dot"></div>
            <span>IES Politécnico Soria | Activo</span>
        </div>
    </header>

    <main class="main-app">
